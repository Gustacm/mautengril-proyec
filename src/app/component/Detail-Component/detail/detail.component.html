<div class="food-card">
    <header>
      <button class="back-button" (click)="hideDetail()"><svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24"><path fill="currentColor" d="M11.884 6.116a1.25 1.25 0 0 0-1.768 0l-5 5a1.25 1.25 0 0 0 0 1.768l5 5a1.25 1.25 0 0 0 1.768-1.768L9.018 13.25H18a1.25 1.25 0 1 0 0-2.5H9.018l2.866-2.866a1.25 1.25 0 0 0 0-1.768"/></svg></button>
<!--       <button class="search-button">🔍</button> -->
<h2 class="nombre-head">{{dataProduct.nombre}}</h2>
<!-- <img src="logo1.png" class="logo"> -->
    </header>
  
    <img src={{dataProduct.Image}} alt="Hamburguesa de Carne" class="food-image" />
  
    <h2 class="name-product">{{dataProduct.nombre}}</h2>
    <p class="description">
      {{dataProduct.descripcion}}
    </p>
  
    <div class="quantity-control">
      <span>Porción</span>
      <button (click)="decreaseQuantity()"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 512 512"><path fill="currentColor" d="M1 229.3h512v85.3H1z"/></svg></button>
      <span>{{ quantity }}</span>
      <button (click)="increaseQuantity()"><svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24"><path fill="currentColor" d="M12 5a1 1 0 0 1 1 1v5h5a1 1 0 1 1 0 2h-5v5a1 1 0 1 1-2 0v-5H6a1 1 0 1 1 0-2h5V6a1 1 0 0 1 1-1"/></svg></button>
    </div>
  
    <p class="rating">
      <span class="star">★</span> 4.9 – Tiempo de Preparación {{dataProduct.time}} minutos
    </p>
  
    <footer>
      <span class="price">{{dataProduct.precio}}</span>
      <button class="order-button">ORDER NOW</button>
    </footer>
  </div>
